<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Random CSS Gradient Generator | Click to Generate</title>
    
    <meta name="description" content="Generate beautiful, random linear CSS gradients with a single click. Copy the raw CSS code instantly for your web design projects.">
    
    <meta name="keywords" content="gradient generator, random gradient, CSS gradient, web design tool, linear gradient">
        <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Default fallback background */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: background 0.5s ease;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .css-output {
            background: #222;
            color: #00ff66;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            word-break: break-all;
            margin-bottom: 20px;
            text-align: left;
        }

        button {
            background: #333;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background: #555;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Gradient Generator</h1>
        <div class="css-output" id="cssCode">background: linear-gradient(135deg, #667eea, #764ba2);</div>
        <button id="generateBtn">Generate New Gradient</button>
        <small>Made with ❤ by Ruchir!</small>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const cssCodeText = document.getElementById('cssCode');

        // Function to generate a random hex color
        function getRandomHexColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        // Function to generate a random angle between 0 and 360 degrees
        function getRandomAngle() {
            return Math.floor(Math.random() * 361) + 'deg';
        }

        // Function to create and apply the new gradient
        function createRandomGradient() {
            const color1 = getRandomHexColor();
            const color2 = getRandomHexColor();
            const angle = getRandomAngle();

            const gradientString = `linear-gradient(${angle}, ${color1}, ${color2})`;

            // Apply to the page background
            document.body.style.background = gradientString;

            // Update the text box display
            cssCodeText.textContent = `background: ${gradientString};`;
        }

        // Event listener for the click action
        generateBtn.addEventListener('click', createRandomGradient);
    </script>
</body>
</html>
